# pass at runtime: --extra-vars "k3s_scrape_token=..."  -- the ServiceAccount
# token from manifests/prometheus-scrape-rbac.yml. Omitting it leaves an empty
# placeholder so the playbook stays idempotent before the cluster side exists.
- name: Prometheus for k3s observability
  hosts: prometheus
  become: true
  tasks:
    - name: Base packages + guest agent
      ansible.builtin.apt:
        name:
          [
            qemu-guest-agent,
            curl,
            vim,
            ca-certificates,
            # Debian's package: older than upstream but comes with a systemd
            # unit, a prometheus user, and sane /etc + /var/lib layout
            prometheus,
          ]
        update_cache: true

    - name: Enable guest agent
      ansible.builtin.systemd_service:
        name: qemu-guest-agent
        state: started
        enabled: true

    - name: Scrape config
      ansible.builtin.template:
        src: templates/prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: "0644"
      notify: restart prometheus

    - name: Write k3s scrape token
      ansible.builtin.copy:
        content: "{{ k3s_scrape_token }}"
        dest: /etc/prometheus/k3s-token
        owner: prometheus
        group: prometheus
        mode: "0600"
      no_log: true
      when: k3s_scrape_token is defined
      notify: restart prometheus

    # placeholder so prometheus starts before the token exists; kubelet
    # scrapes just fail with 401 until the real token lands
    - name: Empty token placeholder
      ansible.builtin.copy:
        content: ""
        dest: /etc/prometheus/k3s-token
        force: false
        owner: prometheus
        group: prometheus
        mode: "0600"
      when: k3s_scrape_token is not defined

    - name: Enable and start Prometheus
      ansible.builtin.systemd_service:
        name: prometheus
        state: started
        enabled: true

  handlers:
    - name: restart prometheus
      ansible.builtin.systemd_service:
        name: prometheus
        state: restarted
